name: Weekly Forecasting Digest

on:
  schedule:
    # Every Saturday at 7:00 AM UTC
    - cron: "0 7 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  forecasting-digest-and-publish:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. Generate digest → email → write post ───────────────────────────
      - name: Run forecasting digest
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:            ${{ secrets.FROM_EMAIL }}
          TO_EMAILS_FORECASTING: ${{ secrets.TO_EMAILS_FORECASTING }}
          TOPICS_FORECASTING:    ${{ vars.TOPICS_FORECASTING }}
          JOURNALS:              ${{ vars.JOURNALS }}
        run: python forecasting_digest.py

      # ── 4. Commit new post ────────────────────────────────────────────────
      - name: Commit new post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "digest: add forecasting post $(date +'%Y-%m-%d')"
          git push

      # ── 5. Jekyll build ───────────────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --destination ./_site

      # ── 6. Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: forecasting-digest-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
